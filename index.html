<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CDU">
<meta name="theme-color" content="#1a1a1a">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<title>CDU Trainer</title>
<style>
/* ============================================================
   CDU TRAINER — B737NG Scratchpad Typing PWA
   Color tokens follow FCOM CDU Page Color definitions
   ============================================================ */
:root{
  --bezel:#5e5e5e;
  --bezel-dark:#3d3d3d;
  --bezel-edge:#1f1f1f;
  --key-bg:#161616;
  --key-bg-active:#050505;
  --key-text:#ececec;
  --key-border:#000;
  --screen-bg:#000;
  --screen-bezel:#222;
  --cdu-white:#ffffff;
  --cdu-cyan:#00d2d2;
  --cdu-magenta:#ff4dff;
  --cdu-green:#33ff33;
  --cdu-shaded:#a8a8a8;
  --cdu-amber:#ffb000;
  --annunciator-off:#3a3a3a;
  --lsk-bg:#1a1a1a;
  --lsk-stripe:#5a5a5a;
  --bg-page:#1d1d1d;
  --reset-bg:#2c2c2c;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}
html,body{height:100%;margin:0;padding:0;background:var(--bg-page);overflow:hidden;font-family:'B612 Mono',ui-monospace,Menlo,Consolas,monospace;color:#ddd}
body{
  display:flex;align-items:flex-start;justify-content:center;
  /* Reserve room for iOS status bar even outside PWA mode */
  padding-top: max(env(safe-area-inset-top), 44px);
  padding-bottom: max(env(safe-area-inset-bottom), 8px);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* Landscape lock */
.rotate-warning{display:none;position:fixed;inset:0;background:#000;color:#eee;align-items:center;justify-content:center;text-align:center;z-index:9999;padding:24px;font-size:16px;letter-spacing:.04em}
@media (orientation:landscape){
  .rotate-warning{display:flex}
  .app{display:none!important}
}

/* ============================================================
   APP CONTAINER
   ============================================================ */
.app{
  position:relative;
  width:min(100vw, 720px);
  display:flex;flex-direction:column;align-items:center;
}

/* Reset button — outside bezel, top-right of app */
.reset-btn{
  position:absolute;top:-2px;right:8px;
  width:46px;height:46px;border-radius:50%;
  background:var(--reset-bg);color:#bbb;
  border:1px solid #444;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;line-height:1;
  box-shadow:0 2px 5px rgba(0,0,0,.5);
  z-index:10;cursor:pointer;
}
.reset-btn:active{background:#111;transform:scale(.94)}

/* ============================================================
   BEZEL — CDU body
   ============================================================ */
.bezel{
  width:100%;
  background:linear-gradient(180deg,var(--bezel) 0%,#525252 50%,var(--bezel-dark) 100%);
  border:2px solid var(--bezel-edge);
  border-radius:14px;
  padding:14px 14px 12px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(0,0,0,.3),
    0 8px 18px rgba(0,0,0,.55);
  display:flex;flex-direction:column;gap:14px;
  position:relative;
}
/* Two screw-head decorations top corners of screen */
.screen-wrap::before,.screen-wrap::after{
  content:"";position:absolute;top:6px;width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#aaa,#333);
  box-shadow:inset 0 0 1px rgba(0,0,0,.6);
  pointer-events:none;
}
.screen-wrap::before{left:8px}
.screen-wrap::after{right:8px}

/* ============================================================
   DISPLAY ROW — LSK | screen | LSK
   ------------------------------------------------------------
   Trick: LSK columns and the screen share the SAME 8-row grid
   template (title / 6 lines / scratchpad). Empty cells (top &
   bottom) on the LSK columns leave the LSK buttons exactly
   aligned with the 6 line rows in the display.
   ============================================================ */
.display-row{
  display:grid;
  grid-template-columns:32px 1fr 32px;
  gap:6px;
  align-items:stretch;
}

.lsk-col{
  display:grid;
  /* Match screen's grid: title (auto), 6 line rows, scratchpad (auto) */
  grid-template-rows:1.4fr repeat(6, 2fr) 1.2fr;
  gap:4px;
  padding:4px 0;
}
.lsk{
  background:repeating-linear-gradient(
    180deg,
    var(--lsk-stripe) 0 2px,
    transparent 2px 6px
  ),linear-gradient(180deg,#222,#0e0e0e);
  border:1px solid #050505;
  border-radius:3px;
  width:100%;height:100%;
  min-height:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -2px 3px rgba(0,0,0,.55);
}
.lsk:active,.lsk.is-pressed{filter:brightness(.5);transform:translateY(1px)}
/* spacers (top + bottom of LSK column) */
.lsk-spacer{visibility:hidden}

/* Screen wrap & screen */
.screen-wrap{
  background:var(--screen-bezel);
  border:2px solid #000;
  border-radius:8px;
  padding:18px 8px 8px;
  position:relative;
  display:flex;
  min-height:0;
}
.screen{
  flex:1;
  background:var(--screen-bg);
  border-radius:4px;
  padding:8px 12px;
  display:grid;
  grid-template-rows:1.4fr repeat(6, 2fr) 1.2fr;
  gap:2px;
  font-family:'B612 Mono',ui-monospace,Menlo,Consolas,monospace;
  font-weight:700;
  color:var(--cdu-white);
  font-size:clamp(11px,2.5vw,16px);
  letter-spacing:.06em;
  text-shadow:0 0 2px rgba(255,255,255,.18);
  background-image:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.015) 0 1px,
    transparent 1px 2px
  );
  overflow:hidden;
}

.screen-title{
  text-align:center;
  align-self:center;
  color:var(--cdu-white);
  white-space:pre;
}
.screen-line{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 4px;
  white-space:pre;
  min-width:0;
}
.screen-line .left,.screen-line .right{color:var(--cdu-white);white-space:pre}
.screen-line .left{text-align:left}
.screen-line .right{text-align:right}
.screen-scratchpad{
  align-self:end;
  padding:0 4px 2px;
  color:var(--cdu-white);
  white-space:pre;
  min-height:1.2em;
  border-top:1px solid rgba(255,255,255,.05);
}

/* Color spans inside screen (future-proof for magenta/cyan/etc.) */
.cdu-w{color:var(--cdu-white)}
.cdu-c{color:var(--cdu-cyan)}
.cdu-m{color:var(--cdu-magenta)}
.cdu-g{color:var(--cdu-green)}
.cdu-sh{color:var(--cdu-shaded);background:rgba(255,255,255,.08)}
.cdu-a{color:var(--cdu-amber)}

/* Side annunciator labels */
.annunciator-side{
  position:absolute;font-size:8px;color:var(--annunciator-off);
  font-weight:700;letter-spacing:.12em;
  writing-mode:vertical-rl;text-orientation:upright;
  pointer-events:none;
}
.ann-msg{ top:14%;right:-3px}
.ann-ofst{top:50%;right:-3px}
.ann-call{top:14%;left:-3px}
.ann-fail{top:50%;left:-3px}

/* ============================================================
   KEYPAD GRID — 8 columns, square keys, generous gap
   ============================================================ */
.keypad{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:8px;
}

.key{
  background:var(--key-bg);
  color:var(--key-text);
  border:1px solid var(--key-border);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'B612 Mono',ui-monospace,Menlo,Consolas,monospace;
  font-weight:700;
  font-size:clamp(9px,1.7vw,12px);
  line-height:1;
  text-align:center;
  padding:0 2px;
  aspect-ratio: 1 / 1;
  cursor:pointer;
  position:relative;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -2px 3px rgba(0,0,0,.55),
    0 1px 1px rgba(0,0,0,.4);
  transition:background-color .04s linear,transform .04s linear;
  letter-spacing:.04em;
}
.key:active,.key.is-pressed{
  background:var(--key-bg-active);
  transform:translateY(1px);
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04);
}
.key.fn{font-size:clamp(8px,1.4vw,10.5px)}
.key.alpha{font-size:clamp(13px,2.2vw,16px)}
.key.num{
  font-size:clamp(13px,2.3vw,17px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#2a2a2a,#0a0a0a 75%);
  border:1px solid #000;
}
.key.num:active{background:radial-gradient(circle at 35% 30%,#1a1a1a,#000 75%)}
.key.misc{font-size:clamp(10px,1.8vw,13px)}

.key .legend{display:flex;flex-direction:column;align-items:center;line-height:1;gap:1px}

/* BRT knob (same cell size as a key) */
.brt-knob{
  background:radial-gradient(circle at 35% 30%,#3a3a3a,#0a0a0a 75%);
  border-radius:50%;
  border:1px solid #000;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.08),
    inset 0 -3px 5px rgba(0,0,0,.6);
  position:relative;
  aspect-ratio: 1 / 1;
}
.brt-knob::after{
  content:"BRT";position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  font-size:9px;color:#cfcfcf;letter-spacing:.12em;
}

/* EXEC light annunciator (small white bar above EXEC key) */
.exec-cell{display:flex;flex-direction:column;align-items:stretch;gap:2px;aspect-ratio: 1 / 1}
.exec-light{
  background:#0a0a0a;border:1px solid #000;border-radius:2px;
  height:6px;flex:0 0 auto;
}
.key.exec{aspect-ratio:auto;flex:1;font-size:clamp(9px,1.6vw,11.5px)}

/* Plain spacer cell (no key) */
.spacer{visibility:hidden}

/* Footer label */
.bezel-label{
  text-align:center;color:#cfcfcf;
  font-size:9px;letter-spacing:.18em;
  margin-top:2px;font-weight:700;
}

/* Smaller iPad mini portrait */
@media (max-height:780px){
  .bezel{padding:10px 10px 10px;gap:8px}
  .keypad{gap:6px}
}
</style>
</head>

<div class="app">

<script>
/* ============================================================
   CDU TRAINER — Application Logic
   ------------------------------------------------------------
   Stable DOM: line/scratchpad text nodes are pre-rendered.
   We only update textContent, never re-write innerHTML — so
   the layout never shifts and the scratchpad stays fixed at
   the bottom of the screen.

   Events: pointerdown (not click) for snappy iPad response and
   to avoid iOS missing taps that get classified as scrolls.
   ============================================================ */

const SCRATCHPAD_MAX = 22;   // CDU scratchpad max characters
const CLR_HOLD_MS    = 1000; // CLR long-press threshold

/* ---------------- State ---------------- */
const state = {
  scratchpad:'',
  scratchpadIsMsg:false,
  lines:Array.from({length:6},()=>({left:'',right:''})),
  plusMinusActive:false,
};

/* ---------------- DOM refs ---------------- */
const $scratchpad = document.getElementById('scratchpad');
const $linesL = []; const $linesR = [];
for(let i=0;i<6;i++){
  $linesL.push(document.getElementById(`line-${i}-L`));
  $linesR.push(document.getElementById(`line-${i}-R`));
}

/* ---------------- Rendering ---------------- */
function render(){
  for(let i=0;i<6;i++){
    const L = state.lines[i].left;
    const R = state.lines[i].right;
    $linesL[i].textContent = L === '' ? '------' : L;
    $linesR[i].textContent = R === '' ? '------' : R;
  }
  $scratchpad.textContent = state.scratchpad;
}

/* ---------------- Scratchpad mutators ---------------- */
function appendChar(c){
  if(state.scratchpadIsMsg){ state.scratchpad=''; state.scratchpadIsMsg=false; }
  if(state.scratchpad.length >= SCRATCHPAD_MAX) return;
  state.scratchpad += c;
  state.plusMinusActive = false;
  render();
}

function pressPlusMinus(){
  if(state.scratchpadIsMsg){ state.scratchpad=''; state.scratchpadIsMsg=false; }
  if(state.plusMinusActive && state.scratchpad.length>0){
    const last = state.scratchpad.slice(-1);
    if(last === '-' || last === '+'){
      state.scratchpad = state.scratchpad.slice(0,-1) + (last === '-' ? '+' : '-');
      render(); return;
    }
  }
  if(state.scratchpad.length >= SCRATCHPAD_MAX) return;
  state.scratchpad += '-';
  state.plusMinusActive = true;
  render();
}

function pressSpace(){ appendChar(' '); }

function pressDelete(){
  if(state.scratchpad === 'DELETE') return;
  state.scratchpad = 'DELETE';
  state.scratchpadIsMsg = false;
  state.plusMinusActive = false;
  render();
}

function clrShortPress(){
  if(state.scratchpadIsMsg){
    state.scratchpad=''; state.scratchpadIsMsg=false;
  } else if(state.scratchpad.length>0){
    state.scratchpad = state.scratchpad.slice(0,-1);
  }
  state.plusMinusActive = false;
  render();
}
function clrLongPress(){
  state.scratchpad=''; state.scratchpadIsMsg=false; state.plusMinusActive=false;
  render();
}

/* ---------------- LSK logic ---------------- */
function pressLSK(id){
  const side = id[0];
  const idx  = parseInt(id.slice(1),10) - 1;
  if(idx<0||idx>5) return;
  const slot = side === 'L' ? 'left' : 'right';
  const lineVal  = state.lines[idx][slot];

  if(state.scratchpad === 'DELETE'){
    state.lines[idx][slot] = '';
    state.scratchpad = '';
    state.scratchpadIsMsg = false;
    state.plusMinusActive = false;
    render(); return;
  }

  const sp = state.scratchpad;
  const spEmpty   = sp.length === 0;
  const lineEmpty = lineVal.length === 0;

  if(spEmpty && lineEmpty) return;

  if(spEmpty && !lineEmpty){
    state.scratchpad = lineVal; state.scratchpadIsMsg = false;
    state.lines[idx][slot] = '';
  } else if(!spEmpty && lineEmpty){
    state.lines[idx][slot] = sp;
    state.scratchpad = ''; state.scratchpadIsMsg = false;
  } else {
    state.lines[idx][slot] = sp;
    state.scratchpad = lineVal; state.scratchpadIsMsg = false;
  }
  state.plusMinusActive = false;
  render();
}

/* ---------------- Reset ---------------- */
function resetAll(){
  state.scratchpad='';
  state.scratchpadIsMsg=false;
  state.plusMinusActive=false;
  state.lines = Array.from({length:6},()=>({left:'',right:''}));
  render();
}

/* ============================================================
   Event wiring — POINTERDOWN for snappy iPad input.
   Each interactive element gets its own listener so events
   don't bubble through unrelated children.
   ============================================================ */
function flash(el){
  el.classList.add('is-pressed');
  setTimeout(()=>el.classList.remove('is-pressed'),60);
}

function handleKeyPress(btn){
  if(btn.dataset.noop !== undefined) return;
  const action = btn.dataset.action;
  const ch = btn.dataset.char;
  if(action === 'plusminus')  return pressPlusMinus();
  if(action === 'space')      return pressSpace();
  if(action === 'delete')     return pressDelete();
  if(action === 'clear')      return; // CLR has its own pointer handler
  if(typeof ch === 'string')  return appendChar(ch);
}

/* Wire each .key with pointerdown */
document.querySelectorAll('.key').forEach(btn=>{
  btn.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    flash(btn);
    if(btn.id === 'clrKey') return; // CLR handled separately
    handleKeyPress(btn);
  });
  // Prevent the click from also firing (we already handled pointerdown)
  btn.addEventListener('click', e=> e.preventDefault());
});

/* CLR — long-press support via pointerdown/up timer */
(function wireCLR(){
  const clr = document.getElementById('clrKey');
  let longFired = false, holdTimer = null;
  clr.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    longFired = false;
    holdTimer = setTimeout(()=>{ longFired = true; clrLongPress(); }, CLR_HOLD_MS);
  });
  const finish = (e)=>{
    if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
    if(!longFired) clrShortPress();
  };
  const cancel = ()=>{ if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; } longFired = true; };
  clr.addEventListener('pointerup',   finish);
  clr.addEventListener('pointercancel', cancel);
  clr.addEventListener('pointerleave', cancel);
})();

/* LSK clicks via pointerdown */
document.querySelectorAll('.lsk').forEach(el=>{
  el.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    flash(el);
    pressLSK(el.dataset.lsk);
  });
});

/* Reset */
document.getElementById('resetBtn').addEventListener('click', resetAll);

/* Prevent iOS pinch zoom */
document.addEventListener('gesturestart', e=>e.preventDefault());

/* Prevent context menu on long press anywhere in bezel */
document.getElementById('bezel').addEventListener('contextmenu', e=>e.preventDefault());

/* Service worker (offline) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

/* ---------------- Boot ---------------- */
render();

/* Future hooks (dictation mode, error stats) */
window.CDU = {
  getState: ()=> JSON.parse(JSON.stringify(state)),
  setScratchpad: (s)=>{ state.scratchpad=String(s||''); state.scratchpadIsMsg=false; render(); },
  reset: resetAll,
};
</script>
</body>
</html>
