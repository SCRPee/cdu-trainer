<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CDU">
<meta name="theme-color" content="#000000">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Share Tech Mono → slashed zero is the DEFAULT glyph (no OpenType feature
     toggle required, so it renders reliably on iOS Safari). B612 Mono kept
     as a secondary fallback; we'll only see it if Share Tech Mono fails. -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=B612+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>CDU Trainer</title>
<style>
/* ============================================================
   CDU TRAINER — Photo-backed B737NG CDU
   Authentic FCOM preflight flow:
   IDENT → POS INIT → RTE → PERF INIT → N1 LIMIT → TAKEOFF REF 1/2 → 2/2
   ============================================================ */
:root{
  --screen-bg:#000;
  --cdu-white:#ffffff;
  --cdu-cyan:#29e3ff;
  --press-shade: rgba(0,0,0,0.32);
  --bg-page:#0a0a0a;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}
html,body{margin:0;padding:0;background:var(--bg-page);overflow:hidden;
  font-family:'Share Tech Mono','JetBrains Mono','B612 Mono',ui-monospace,Menlo,Consolas,monospace;color:#ddd}
/* Use dvh (dynamic viewport) so iPad standalone PWA mode accounts for the
   home-indicator area and doesn't clip the bottom row of buttons. */
html,body{height:100dvh;min-height:100dvh}
@supports not (height: 100dvh){ html,body{height:100vh;min-height:100vh} }

body{
  display:flex;align-items:center;justify-content:center;
  padding: max(env(safe-area-inset-top), 4px)
           max(env(safe-area-inset-right), 4px)
           /* Extra breathing room at the bottom for the iPad home-indicator
              even when the reported inset is 0 (Safari inconsistency). */
           calc(max(env(safe-area-inset-bottom), 4px) + 4px)
           max(env(safe-area-inset-left), 4px);
}

.rotate-warning{display:none;position:fixed;inset:0;background:#000;color:#eee;align-items:center;justify-content:center;text-align:center;z-index:9999;padding:24px;font-size:16px;letter-spacing:.04em}
@media (orientation:landscape){
  .rotate-warning{display:flex}
  .app{display:none!important}
}

/* Stage fits inside the body's content box (which already subtracts safe-area
   padding). height/width:100% lets the flex parent + aspect-ratio scale it to
   whichever dimension is the binding constraint. */
.stage{
  position:relative;
  aspect-ratio: 2088 / 3160;
  height: 100%;
  width:  auto;
  max-height: 100%;
  max-width:  100%;
  margin: auto;
}
@media (max-aspect-ratio: 2088/3160){
  .stage{ width:100%; height:auto; }
}

.reset-btn{
  position:fixed;top:calc(env(safe-area-inset-top) + 8px);right:10px;
  width:40px;height:40px;border-radius:50%;
  background:#2c2c2c;color:#bbb;border:1px solid #444;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;line-height:1;
  box-shadow:0 2px 5px rgba(0,0,0,.5);
  z-index:50;cursor:pointer;
}
.reset-btn:active{background:#111;transform:scale(.94)}

/* ============================================================
   CDU screen — shows through photo cutout
   ============================================================ */
.cdu-screen{
  position:absolute;
  left: 14.51%;
  top:  6.68%;
  width:  70.74%;
  height: 35.19%;
  background: var(--screen-bg);
  z-index: 1;
  overflow: hidden;

  display:grid;
  grid-template-rows: 1fr repeat(6, 2.1fr) 1.1fr;
  padding: 2.0% 2.0%;
  gap: 0.2%;
  /* Share Tech Mono has slashed-zero as its default glyph — this is what
     makes 0 visibly different from O on the real CDU. */
  font-family: 'Share Tech Mono','JetBrains Mono','B612 Mono',ui-monospace,Menlo,Consolas,monospace;
  font-weight:400;                 /* Share Tech Mono only ships weight 400 */
  color:var(--cdu-white);
  letter-spacing:.04em;
  line-height:1.0;
  /* Stronger glow compensates for Share Tech Mono's single-weight strokes
     and mimics the phosphor-ish halo of a real CDU. */
  text-shadow:0 0 3px rgba(255,255,255,.35), 0 0 1px rgba(255,255,255,.9);
  font-size: clamp(10px, 2.0vw, 22px);

  /* Belt & braces: if the fallback font (B612 Mono) is ever used, still
     request slashed-zero where the feature exists. */
  font-variant-numeric: slashed-zero;
  font-feature-settings: "zero" 1, "ss01" 1;

  background-image: repeating-linear-gradient(
    0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 2px
  );
}
.cdu-screen > *{min-height:0;overflow:hidden}

.screen-title{
  text-align:center;align-self:center;
  color:var(--cdu-white);
  white-space:pre;
  letter-spacing:.08em;
}

/* Each line = grid with two columns + absolute-positioned centered layer */
.screen-line{
  position:relative;
  display:grid;
  grid-template-columns: 1fr 1fr;
  padding:0 2px;
  min-width:0;
  align-items:stretch;
}
.screen-line .col{
  display:flex;
  flex-direction:column;
  justify-content:flex-end;   /* label on top, value on bottom (aligns with LSK) */
  min-width:0;
  line-height:1;
  gap: 2px;
}
.screen-line .col.left{  align-items:flex-start; text-align:left; }
.screen-line .col.right{ align-items:flex-end;   text-align:right; }
.screen-line .col.center{
  position:absolute;
  left:0; right:0; bottom:0;
  align-items:center;
  text-align:center;
  pointer-events:none;
  display:none;
}
.screen-line.has-center .col.center{ display:flex; }

.screen-line .label{
  font-size:.58em;
  color:var(--cdu-cyan);
  letter-spacing:.05em;
  line-height:1;
  white-space:pre;
  font-weight:400;        /* Share Tech Mono ships single-weight; the text-shadow adds glow */
}
.screen-line .value{
  font-size:1em;
  color:var(--cdu-white);
  line-height:1;
  white-space:pre;
  font-weight:400;        /* Share Tech Mono ships single-weight; the text-shadow adds glow */
}
.screen-line .value.small{ font-size:.72em; }
.screen-line .value.hi{
  background: var(--cdu-white);
  color:#000;
  padding: 0 .2em;
}

.screen-scratchpad{
  align-self:end;
  padding:0 4px;
  color:var(--cdu-white);
  white-space:pre;
  border-top:1px solid rgba(255,255,255,.06);
  height:100%;
  display:flex;align-items:center;
  font-weight:400;        /* Share Tech Mono ships single-weight; the text-shadow adds glow */
  letter-spacing:.05em;
}
.screen-scratchpad.msg{ color:var(--cdu-white); }

/* ============================================================
   Photo + touch overlay
   ============================================================ */
.cdu-photo{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;-webkit-user-drag:none;user-drag:none}
.btn{position:absolute;background:transparent;border:0;padding:0;margin:0;cursor:pointer;z-index:3;border-radius:6%/4%;color:transparent;font:inherit}
.btn.num-btn{border-radius:50%}
.btn.lsk-btn{border-radius:14%/22%}
.btn::after{content:"";position:absolute;inset:0;background:transparent;border-radius:inherit;pointer-events:none;transition:background .06s linear}
.btn:active::after,.btn.is-pressed::after{background:var(--press-shade)}
</style>
</head>
<body>

<div class="rotate-warning">Please rotate to portrait orientation.</div>
<button class="reset-btn" id="resetBtn" aria-label="Reset">⟲</button>

<div class="stage" id="stage">

  <!-- ============ SCREEN ============ -->
  <div class="cdu-screen" id="screen">
    <div class="screen-title" id="screenTitle"></div>

    <div class="screen-line" data-row="0">
      <div class="col left"><span class="label" id="line-0-LL"></span><span class="value" id="line-0-LV"></span></div>
      <div class="col right"><span class="label" id="line-0-RL"></span><span class="value" id="line-0-RV"></span></div>
      <div class="col center"><span class="label" id="line-0-CL"></span><span class="value" id="line-0-CV"></span></div>
    </div>
    <div class="screen-line" data-row="1">
      <div class="col left"><span class="label" id="line-1-LL"></span><span class="value" id="line-1-LV"></span></div>
      <div class="col right"><span class="label" id="line-1-RL"></span><span class="value" id="line-1-RV"></span></div>
      <div class="col center"><span class="label" id="line-1-CL"></span><span class="value" id="line-1-CV"></span></div>
    </div>
    <div class="screen-line" data-row="2">
      <div class="col left"><span class="label" id="line-2-LL"></span><span class="value" id="line-2-LV"></span></div>
      <div class="col right"><span class="label" id="line-2-RL"></span><span class="value" id="line-2-RV"></span></div>
      <div class="col center"><span class="label" id="line-2-CL"></span><span class="value" id="line-2-CV"></span></div>
    </div>
    <div class="screen-line" data-row="3">
      <div class="col left"><span class="label" id="line-3-LL"></span><span class="value" id="line-3-LV"></span></div>
      <div class="col right"><span class="label" id="line-3-RL"></span><span class="value" id="line-3-RV"></span></div>
      <div class="col center"><span class="label" id="line-3-CL"></span><span class="value" id="line-3-CV"></span></div>
    </div>
    <div class="screen-line" data-row="4">
      <div class="col left"><span class="label" id="line-4-LL"></span><span class="value" id="line-4-LV"></span></div>
      <div class="col right"><span class="label" id="line-4-RL"></span><span class="value" id="line-4-RV"></span></div>
      <div class="col center"><span class="label" id="line-4-CL"></span><span class="value" id="line-4-CV"></span></div>
    </div>
    <div class="screen-line" data-row="5">
      <div class="col left"><span class="label" id="line-5-LL"></span><span class="value" id="line-5-LV"></span></div>
      <div class="col right"><span class="label" id="line-5-RL"></span><span class="value" id="line-5-RV"></span></div>
      <div class="col center"><span class="label" id="line-5-CL"></span><span class="value" id="line-5-CV"></span></div>
    </div>

    <div class="screen-scratchpad" id="scratchpad"></div>
  </div>

  <!-- ============ PHOTO ============ -->
  <img class="cdu-photo" src="cdu_photo.PNG" alt="B737NG CDU" draggable="false">

  <!-- ============ TOUCH OVERLAY ============ -->
  <div class="overlay" id="overlay"></div>

</div>

<script>
/* ============================================================
   BUTTON COORDS — measured from cdu_photo.PNG (2088×3160)
   ============================================================ */
const IMG_W = 2088, IMG_H = 3160;
const BUTTONS = [
  ['L1','lsk',  67,  356,  200,  450], ['L2','lsk',  68,  506,  199,  600],
  ['L3','lsk',  67,  655,  199,  749], ['L4','lsk',  66,  804,  198,  899],
  ['L5','lsk',  66,  954,  198, 1049], ['L6','lsk',  65, 1104,  197, 1198],
  ['R1','lsk',1885,  358, 2017,  453], ['R2','lsk',1885,  508, 2017,  602],
  ['R3','lsk',1885,  657, 2018,  752], ['R4','lsk',1885,  806, 2018,  901],
  ['R5','lsk',1885,  956, 2018, 1051], ['R6','lsk',1886, 1106, 2018, 1202],

  ['INIT_REF','fn', 239,1453, 461,1600],
  ['RTE'     ,'fn', 497,1454, 720,1600],
  ['CLB'     ,'fn', 756,1454, 979,1601],
  ['CRZ'     ,'fn',1015,1454,1238,1601],
  ['DES'     ,'fn',1274,1454,1497,1601],
  ['BRT'     ,'noop',1705,1412,1884,1590],

  ['MENU'    ,'fn', 238,1632, 461,1780],
  ['LEGS'    ,'fn', 496,1633, 719,1780],
  ['DEP_ARR' ,'fn', 755,1633, 978,1781],
  ['HOLD'    ,'fn',1015,1633,1238,1781],
  ['PROG'    ,'fn',1274,1633,1497,1781],
  ['EXEC'    ,'fn',1562,1634,1784,1781],

  ['N1_LIMIT','fn', 237,1812, 460,1959],
  ['FIX'     ,'fn', 495,1813, 719,1960],
  ['A','char', 879,1871,1028,2018],['B','char',1080,1871,1229,2018],
  ['C','char',1282,1872,1430,2019],['D','char',1482,1872,1631,2019],
  ['E','char',1684,1872,1833,2019],

  ['PREV_PAGE','fn',236,1992,459,2140],['NEXT_PAGE','fn',495,1993,718,2140],
  ['F','char', 879,2072,1027,2219],['G','char',1080,2073,1229,2220],
  ['H','char',1281,2073,1430,2220],['I','char',1483,2073,1631,2220],
  ['J','char',1684,2074,1833,2221],

  ['BLANK_1','noop',235,2172, 458,2320],['BLANK_2','noop',494,2172, 717,2320],
  ['K','char', 878,2274,1027,2422],['L','char',1079,2274,1229,2422],
  ['M','char',1281,2275,1431,2422],['N','char',1483,2275,1631,2422],
  ['O','char',1684,2275,1833,2423],

  ['1','char', 253,2368, 386,2498],['2','char', 446,2368, 580,2499],['3','char', 640,2369, 774,2499],

  ['4','char', 252,2541, 386,2672],['5','char', 446,2541, 579,2672],['6','char', 640,2542, 774,2672],
  ['P','char', 877,2476,1027,2623],['Q','char',1079,2476,1229,2624],
  ['R','char',1281,2476,1431,2624],['S','char',1483,2477,1632,2624],
  ['T','char',1684,2477,1834,2625],

  ['7','char', 250,2714, 386,2845],['8','char', 445,2715, 579,2846],['9','char', 639,2715, 773,2846],
  ['U','char', 877,2678,1026,2827],['V','char',1079,2678,1229,2827],
  ['W','char',1281,2679,1430,2827],['X','char',1482,2679,1633,2827],['Y','char',1684,2679,1834,2827],

  ['.'    ,'char'  , 250,2887, 384,3020],['0'    ,'char'  , 444,2888, 578,3020],
  ['PM'   ,'action', 638,2888, 773,3020],['Z'    ,'char'  , 876,2880,1026,3030],
  ['SP'   ,'action',1078,2880,1228,3030],['DEL'  ,'action',1280,2881,1431,3031],
  ['/'    ,'char'  ,1482,2881,1633,3031],['CLR'  ,'clr'   ,1683,2881,1835,3030],
];

/* ============================================================
   Build overlay buttons
   ============================================================ */
const overlay = document.getElementById('overlay');
function pct(v, total){ return (v/total*100) + '%'; }
for(const b of BUTTONS){
  const [id, kind, x0, y0, x1, y1] = b;
  const el = document.createElement('button');
  el.className = 'btn';
  if(kind === 'lsk') el.classList.add('lsk-btn');
  if(/^\d$/.test(id) || id === '.' || id === 'PM') el.classList.add('num-btn');
  el.style.left   = pct(x0, IMG_W);
  el.style.top    = pct(y0, IMG_H);
  el.style.width  = pct(x1-x0, IMG_W);
  el.style.height = pct(y1-y0, IMG_H);
  el.setAttribute('aria-label', id);
  el.dataset.kind = kind;
  el.dataset.id   = id;
  if(id === 'CLR') el.id = 'clrKey';
  overlay.appendChild(el);
}

/* ============================================================
   FMC DATABASE — persistent across pages
   ============================================================ */
const fmc = {
  ident: {
    model: '737-800',
    engRating: '26K',
    navData: 'AIRAC 2604',
    activeDb: 'APR26APR30/26',
    inactiveDb: 'MAR29APR25/26',
    opProgram: 'U14.4',
    suppData: 'APR 21/26',
  },
  posInit: {
    lastPos: 'N41°15.7 E028°44.8',
    refAirport: '',
    gate: '',
    gmtMonDy: '1432.2z 11/20',
    setIrsHdg: '',
    setIrsPos: '',
  },
  route: {
    origin: '', dest: '', coRoute: '', fltNo: '', runway: '',
    activated: false, modified: false,
  },
  perf: {
    grWt: '',  zfw: '', crzCg: '', reserves: '',
    costIndex: '', crzAlt: '',
    crzWindDir: '', crzWindSpd: '',   /* split for dual entry 'DIR/SPD' */
    tcOatC: '',                        /* user-entered OAT in °C (F is derived) */
    transAlt: '10000',
    planFuel: '9.5',            /* hardcoded plan fuel for GW auto-calc */
  },
  n1: { selectedTO: 'TO', selectedCLB: 'CLB', selTemp: '', oat: '' },
  takeoff: {
    flaps: '', cg: '', v1: '', vr: '', v2: '',
    intersect: '',
    rwWind: '', rwCond: 'DRY', rwSlope: '',
    accelHt: '1000', eoAccelHt: '1000', reduction: '800',
  },
  ui: { currentPage: 'IDENT', pageStack: [] },
};

function getField(path){ const [o,k]=path.split('.'); return fmc[o][k]; }
function setField(path, val){ const [o,k]=path.split('.'); fmc[o][k] = val; }
function dash(s, n){ s = s||''; return s.length ? s : '-'.repeat(n); }
function box(s, n){ s = s||''; return s.length ? s : '\u25A1'.repeat(n); }    /* ▢ boxes */

/* ============================================================
   PAGE DEFINITIONS — authentic FCOM layouts
   Each page: title, lines() → [{L,C,R},…] × 6, lsk map
     L/C/R cell: {label, val, cls, hi}
     lsk binding: function() OR {field:'path'} OR {field,action}
   ============================================================ */
const PAGES = {
  /* ===== INIT/REF INDEX ===== */
  INIT_REF_INDEX: {
    title: () => '       INIT/REF INDEX',
    lines: () => [
      { L:{val:'<IDENT'},    R:{val:'NAV DATA>'} },
      { L:{val:'<POS'} },
      { L:{val:'<PERF'},     R:{val:'ALTN DEST>'} },
      { L:{val:'<TAKEOFF'} },
      { L:{val:'<APPROACH'}, R:{val:'NAV STATUS>'} },
      { L:{val:'<OFFSET'},   R:{val:'MAINT>'} },
    ],
    lsk: {
      L1:()=>openPage('IDENT'),
      L2:()=>openPage('POS_INIT'),
      L3:()=>openPage('PERF_INIT'),
      L4:()=>openPage('TAKEOFF_REF'),
    },
  },

  /* ===== IDENT (1/1) ===== */
  IDENT: {
    title: () => '         IDENT      1/1',
    lines: () => [
      { L:{label:'MODEL',    val:fmc.ident.model},
        R:{label:'ENG RATING', val:fmc.ident.engRating} },
      { L:{label:'NAV DATA', val:fmc.ident.navData},
        R:{label:'ACTIVE',     val:fmc.ident.activeDb} },
      { R:{val:fmc.ident.inactiveDb} },
      { L:{label:'OP PROGRAM', val:fmc.ident.opProgram},
        R:{label:'SUPP DATA',  val:fmc.ident.suppData} },
      {},
      { L:{val:'<INDEX'}, R:{val:'POS INIT>'} },
    ],
    lsk: {
      L6:()=>openPage('INIT_REF_INDEX'),
      R6:()=>openPage('POS_INIT'),
    },
  },

  /* ===== POS INIT 1/3 ===== */
  POS_INIT: {
    title: () => '       POS INIT     1/3',
    lines: () => [
      { R:{label:'LAST POS', val:fmc.posInit.lastPos} },
      { L:{label:'REF AIRPORT', val:dash(fmc.posInit.refAirport,4)} },
      { L:{label:'GATE',        val:dash(fmc.posInit.gate,5)},
        R:{label:'SET IRS POS',
           val: fmc.posInit.setIrsPos
                ? fmc.posInit.setIrsPos
                : (box('',4)+'°'+box('',4)+'.'+box('',1)+' '+box('',5)+'°'+box('',4)+'.'+box('',1)) } },
      { L:{label:'GMT-MON/DY', val:fmc.posInit.gmtMonDy},
        R:{label:'SET IRS HDG', val:dash(fmc.posInit.setIrsHdg,3)+'°'} },
      {},
      { L:{val:'<INDEX'}, R:{val:'ROUTE>'} },
    ],
    lsk: {
      L2:{field:'posInit.refAirport'},
      L3:{field:'posInit.gate'},
      R3:{field:'posInit.setIrsPos'},
      L4:{field:'posInit.gmtMonDy'},
      R4:{field:'posInit.setIrsHdg'},
      L6:()=>openPage('INIT_REF_INDEX'),
      R6:()=>openPage('RTE'),
    },
  },

  /* ===== POS REF 2/3 =====
     All rows L1-L5 are COPY-ONLY: pressing the LSK copies the displayed
     coord into the scratchpad so the pilot can paste it back into POS INIT
     SET IRS POS on page 1/3. This is how real-world IRS alignment works. */
  POS_REF: {
    title: () => '        POS REF     2/3',
    lines: () => [
      { L:{label:'FMC POS', val:'N41°15.7 E028°44.8'}, R:{label:'GS', val:'0KT'} },
      { L:{label:'IRS L',   val:'N41°15.7 E028°44.7'}, R:{val:'0KT'} },
      { L:{label:'IRS R',   val:'N41°15.8 E028°44.8'}, R:{val:'0KT'} },
      { L:{label:'GPS L',   val:'N41°15.7 E028°44.8'} },
      { L:{label:'GPS R',   val:'N41°15.7 E028°44.8'} },
      { L:{label:'RADIO',   val:'-----'} },
    ],
    lsk: {
      L1: ()=>copyCoordToScratch('N41°15.7 E028°44.8'),
      L2: ()=>copyCoordToScratch('N41°15.7 E028°44.7'),
      L3: ()=>copyCoordToScratch('N41°15.8 E028°44.8'),
      L4: ()=>copyCoordToScratch('N41°15.7 E028°44.8'),
      L5: ()=>copyCoordToScratch('N41°15.7 E028°44.8'),
    },
  },

  /* ===== POS SHIFT 3/3 (stub) ===== */
  POS_SHIFT: {
    title: () => '       POS SHIFT    3/3',
    lines: () => [
      { L:{label:'POS REF', val:'FMC'} },
      { L:{label:'BRG/DIST', val:'---°/-.-NM'} },
      {},
      {},
      {},
      { L:{val:'<INDEX'}, R:{val:'UPDATE>'} },
    ],
    lsk: {
      L6:()=>openPage('POS_INIT'),
    },
  },

  /* ===== RTE 1 1/2 ===== */
  RTE: {
    /* Auto-paste REF AIRPORT to scratchpad when opening RTE
       (only if scratchpad empty, origin empty, and refAirport set) */

/* ============================================================
   RENDERING
   ============================================================ */
const $title = document.getElementById('screenTitle');
const $scratchpad = document.getElementById('scratchpad');
const lineEls = [];
for(let i=0;i<6;i++){
  lineEls.push({
    el: document.querySelector(`.screen-line[data-row="${i}"]`),
    LL: document.getElementById(`line-${i}-LL`), LV: document.getElementById(`line-${i}-LV`),
    RL: document.getElementById(`line-${i}-RL`), RV: document.getElementById(`line-${i}-RV`),
    CL: document.getElementById(`line-${i}-CL`), CV: document.getElementById(`line-${i}-CV`),
  });
}

function setCell(labelEl, valEl, cell){
  cell = cell || {};
  labelEl.textContent = cell.label || '';
  valEl.textContent   = (cell.val !== undefined && cell.val !== null) ? cell.val : '';
  let cls = 'value';
  if(cell.cls)   cls += ' ' + cell.cls;
  if(cell.hi)    cls += ' hi';
  if(cell.small) cls += ' small';
  valEl.className = cls;
}

function renderCurrentPage(){
  const p = PAGES[fmc.ui.currentPage];
  if(!p){ return; }
  const title = typeof p.title === 'function' ? p.title() : p.title;
  const lines = typeof p.lines === 'function' ? p.lines() : p.lines;
  $title.textContent = title || '';
  for(let i=0;i<6;i++){
    const line = lines[i] || {};
    const els = lineEls[i];
    setCell(els.LL, els.LV, line.L);
    setCell(els.RL, els.RV, line.R);
    setCell(els.CL, els.CV, line.C);
    els.el.classList.toggle('has-center', !!line.C);
  }
}

function renderScratchpad(){
  $scratchpad.textContent = state.scratchpad;
  $scratchpad.classList.toggle('msg', state.scratchpadIsMsg);
}

function render(){ renderCurrentPage(); renderScratchpad(); }

/* ============================================================
   SCRATCHPAD STATE MACHINE
   ============================================================ */
const SCRATCHPAD_MAX = 22;
const CLR_HOLD_MS    = 1000;

const state = {
  scratchpad:'',
  scratchpadIsMsg:false,
  plusMinusActive:false,
};

function appendChar(c){
  if(state.scratchpadIsMsg){ state.scratchpad=''; state.scratchpadIsMsg=false; }
  if(state.scratchpad.length >= SCRATCHPAD_MAX) return;
  state.scratchpad += c;
  state.plusMinusActive = false;
  renderScratchpad();
}

function pressPlusMinus(){
  if(state.scratchpadIsMsg){ state.scratchpad=''; state.scratchpadIsMsg=false; }
  if(state.plusMinusActive && state.scratchpad.length>0){
    const last = state.scratchpad.slice(-1);
    if(last === '-' || last === '+'){
      state.scratchpad = state.scratchpad.slice(0,-1) + (last === '-' ? '+' : '-');
      renderScratchpad(); return;
    }
  }
  if(state.scratchpad.length >= SCRATCHPAD_MAX) return;
  state.scratchpad += '-';
  state.plusMinusActive = true;
  renderScratchpad();
}

function pressSpace(){ appendChar(' '); }

function pressDelete(){
  if(state.scratchpad === 'DELETE') return;
  state.scratchpad = 'DELETE';
  state.scratchpadIsMsg = true;
  state.plusMinusActive = false;
  renderScratchpad();
}

function clrShortPress(){
  if(state.scratchpadIsMsg){
    state.scratchpad=''; state.scratchpadIsMsg=false;
  } else if(state.scratchpad.length>0){
    state.scratchpad = state.scratchpad.slice(0,-1);
  }
  state.plusMinusActive = false;
  renderScratchpad();
}
function clrLongPress(){
  state.scratchpad=''; state.scratchpadIsMsg=false; state.plusMinusActive=false;
  renderScratchpad();
}

/* ============================================================
   LSK DISPATCH — page-aware
   ============================================================ */
function pressLSK(lskId){
  const page = PAGES[fmc.ui.currentPage];
  if(!page) return;
  const binding = (page.lsk || {})[lskId];
  if(!binding) return;

  if(typeof binding === 'function'){
    if(state.scratchpadIsMsg && state.scratchpad === 'DELETE') return;
    binding();
    return;
  }
  if(binding.dual){
    handleDualFieldTransfer(binding.dual[0], binding.dual[1], !!binding.mod, binding.onSet);
    return;
  }
  if(binding.field){
    handleFieldTransfer(binding.field, !!binding.mod, binding.onSet);
  }
}

function handleFieldTransfer(fieldPath, markModified, onSet){
  const cur = getField(fieldPath) || '';

  /* DELETE → clear field (only if DEL key was used, not typed letters) */
  if(state.scratchpadIsMsg && state.scratchpad === 'DELETE'){
    setField(fieldPath, '');
    if(markModified) markRouteMod(fieldPath);
    if(typeof onSet === 'function') onSet('');
    state.scratchpad=''; state.scratchpadIsMsg=false; state.plusMinusActive=false;
    render(); return;
  }

  if(state.scratchpad.length === 0){
    /* COPY field to scratchpad (don't clear field) */
    if(cur.length > 0){
      state.scratchpad = cur;
      state.scratchpadIsMsg = false;
    }
  } else {
    /* Transfer scratchpad → field, clear scratchpad */
    const val = state.scratchpad;
    setField(fieldPath, val);
    if(markModified) markRouteMod(fieldPath);
    if(typeof onSet === 'function') onSet(val);
    state.scratchpad=''; state.scratchpadIsMsg=false;
  }
  state.plusMinusActive = false;
  render();
}

/* ---- Dual-field transfer: '/22' → second only, '680/' → first only,
   '680/22' → both, no slash → first field ---- */
function handleDualFieldTransfer(firstPath, secondPath, markModified, onSet){
  const curA = getField(firstPath) || '';
  const curB = getField(secondPath) || '';

  /* DELETE → clear both (only if DEL key was used) */
  if(state.scratchpadIsMsg && state.scratchpad === 'DELETE'){
    setField(firstPath, '');  setField(secondPath, '');
    if(markModified){ markRouteMod(firstPath); markRouteMod(secondPath); }
    if(typeof onSet === 'function') onSet('', '');
    state.scratchpad=''; state.scratchpadIsMsg=false; state.plusMinusActive=false;
    render(); return;
  }

  if(state.scratchpad.length === 0){
    /* COPY joined fields back to scratchpad */
    let joined = '';
    if(curA && curB)      joined = curA+'/'+curB;
    else if(curA)          joined = curA;
    else if(curB)          joined = '/'+curB;
    if(joined){ state.scratchpad = joined; state.scratchpadIsMsg = false; }
  } else {
    const sp = state.scratchpad;
    const slash = sp.indexOf('/');
    let aNew = curA, bNew = curB;
    if(slash === -1){                       /* '680' → first field */
      aNew = sp;
    } else if(slash === 0){                 /* '/22' → second field only */
      bNew = sp.slice(1);
    } else if(slash === sp.length-1){       /* '680/' → first field only */
      aNew = sp.slice(0, -1);
    } else {                                /* '680/22' → both */
      aNew = sp.slice(0, slash);
      bNew = sp.slice(slash+1);
    }
    setField(firstPath, aNew);
    setField(secondPath, bNew);
    if(markModified){ markRouteMod(firstPath); markRouteMod(secondPath); }
    if(typeof onSet === 'function') onSet(aNew, bNew);
    state.scratchpad=''; state.scratchpadIsMsg=false;
  }
  state.plusMinusActive = false;
  render();
}

/* Copy a displayed coord/value into the scratchpad (POS REF LSKs) */
function copyCoordToScratch(val){
  state.scratchpad = val;
  state.scratchpadIsMsg = false;
  state.plusMinusActive = false;
  renderScratchpad();
}

function markRouteMod(fieldPath){
  if(fieldPath.startsWith('route.') && fmc.route.activated){
    fmc.route.modified = true;
    fmc.route.activated = false;    /* activation is lost until re-activated */
  } else if(fieldPath.startsWith('route.')){
    fmc.route.modified = true;
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function openPage(id){
  if(!PAGES[id]) return;
  const changed = (fmc.ui.currentPage !== id);
  if(changed){
    fmc.ui.pageStack.push(fmc.ui.currentPage);
    if(fmc.ui.pageStack.length > 20) fmc.ui.pageStack.shift();
  }
  fmc.ui.currentPage = id;
  /* per-page onEnter hook (only when navigating TO a new page) */
  if(changed && typeof PAGES[id].onEnter === 'function'){
    PAGES[id].onEnter();
  }
  render();
}

function pressFn(id){
  const dest = FN_ROUTES[id];
  if(dest) openPage(dest);
}

/* PREV/NEXT page — cycle within the active page family */
const PAGE_CYCLES = {
  RTE:['RTE','RTE2'], RTE2:['RTE','RTE2'],
  POS_INIT:['POS_INIT','POS_REF','POS_SHIFT'],
  POS_REF:['POS_INIT','POS_REF','POS_SHIFT'],
  POS_SHIFT:['POS_INIT','POS_REF','POS_SHIFT'],
  TAKEOFF_REF:['TAKEOFF_REF','TAKEOFF_REF_2'],
  TAKEOFF_REF_2:['TAKEOFF_REF','TAKEOFF_REF_2'],
  PERF_INIT:['PERF_INIT','PERF_LIMITS'],
  PERF_LIMITS:['PERF_INIT','PERF_LIMITS'],
};
function step(dir){
  const cycle = PAGE_CYCLES[fmc.ui.currentPage];
  if(!cycle) return;
  const i = cycle.indexOf(fmc.ui.currentPage);
  const n = cycle.length;
  const next = cycle[(i + (dir>0?1:-1) + n) % n];
  openPage(next);
}
function pressPrevPage(){ step(-1); }
function pressNextPage(){ step(+1); }

function resetAll(){
  state.scratchpad=''; state.scratchpadIsMsg=false; state.plusMinusActive=false;
  /* reset all user-entered data, keep IDENT */
  fmc.posInit = {
    lastPos:'N41°15.7 E028°44.8',
    refAirport:'', gate:'',
    gmtMonDy:'1432.2z 11/20',
    setIrsHdg:'', setIrsPos:'',
  };
  fmc.route = { origin:'', dest:'', coRoute:'', fltNo:'', runway:'', activated:false, modified:false };
  fmc.perf  = { grWt:'', zfw:'', crzCg:'', reserves:'', costIndex:'',
                crzAlt:'', crzWindDir:'', crzWindSpd:'',
                tcOatC:'', transAlt:'10000', planFuel:'9.5' };
  fmc.n1    = { selectedTO:'TO', selectedCLB:'CLB', selTemp:'', oat:'' };
  fmc.takeoff = { flaps:'', cg:'', v1:'', vr:'', v2:'',
                  intersect:'', rwWind:'', rwCond:'DRY', rwSlope:'',
                  accelHt:'1000', eoAccelHt:'1000', reduction:'800' };
  fmc.ui.pageStack = [];
  openPage('IDENT');
  renderScratchpad();
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
function flash(el){ el.classList.add('is-pressed'); setTimeout(()=>el.classList.remove('is-pressed'),70); }

function dispatch(btn){
  const kind = btn.dataset.kind;
  const id   = btn.dataset.id;
  if(kind === 'noop')   return;
  if(kind === 'lsk' )   return pressLSK(id);
  if(kind === 'char')   return appendChar(id);
  if(kind === 'fn'){
    if(id === 'PREV_PAGE') return pressPrevPage();
    if(id === 'NEXT_PAGE') return pressNextPage();
    if(id === 'EXEC')      return;
    return pressFn(id);
  }
  if(kind === 'action'){
    if(id === 'PM')  return pressPlusMinus();
    if(id === 'SP')  return pressSpace();
    if(id === 'DEL') return pressDelete();
  }
}

overlay.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    flash(btn);
    if(btn.dataset.kind === 'clr') return;
    dispatch(btn);
  });
  btn.addEventListener('click', e=>e.preventDefault());
});

/* CLR — long-press ≥1s wipes scratchpad; short-press backspaces */
(function wireCLR(){
  const clr = document.getElementById('clrKey');
  if(!clr) return;
  let longFired = false, holdTimer = null;
  clr.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    longFired = false;
    holdTimer = setTimeout(()=>{ longFired = true; clrLongPress(); }, CLR_HOLD_MS);
  });
  const finish = ()=>{
    if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
    if(!longFired) clrShortPress();
  };
  const cancel = ()=>{ if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; } longFired = true; };
  clr.addEventListener('pointerup',   finish);
  clr.addEventListener('pointercancel', cancel);
  clr.addEventListener('pointerleave', cancel);
})();

document.getElementById('resetBtn').addEventListener('click', resetAll);
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

/* Initial render */
openPage('IDENT');
render();

/* Public API */
window.CDU = {
  getState: ()=> JSON.parse(JSON.stringify({ state, fmc })),
  open: openPage,
  press: (id)=>{ const b = overlay.querySelector(`[data-id="${id}"]`); if(b){ flash(b); dispatch(b); } },
  reset: resetAll,
  fmc,
};
</script>
