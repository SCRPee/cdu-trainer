<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CDU">
<meta name="theme-color" content="#7a7a7a">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=B612+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>CDU Trainer</title>
<style>
/* ============================================================
   CDU TRAINER — B737NG Scratchpad Typing PWA
   Visual reference: 737 FCOM CDU panel + cockpit photo
   ============================================================ */
:root{
  /* Bezel — cockpit-gray */
  --bezel-light:#a3a3a3;
  --bezel:#8a8a8a;
  --bezel-dark:#6a6a6a;
  --bezel-edge:#3a3a3a;

  /* Keys */
  --key-bg:#161616;
  --key-bg-active:#050505;
  --key-text:#f0f0f0;
  --key-border:#000;

  /* Screen / CDU page colors */
  --screen-bg:#000;
  --screen-frame:#1a1a1a;
  --cdu-white:#ffffff;
  --cdu-cyan:#00d2d2;
  --cdu-magenta:#ff4dff;
  --cdu-green:#33ff33;
  --cdu-shaded:#a8a8a8;

  /* Annunciator silk-screen */
  --ann-text:#d8c468;
  --ann-bezel:#262626;

  /* LSK */
  --lsk-bg:#1a1a1a;
  --lsk-stripe:#5a5a5a;

  --bg-page:#0a0a0a;
  --reset-bg:#2c2c2c;

  /* Sizing tokens */
  --key:        clamp(26px, 5.0vw, 40px);          /* alpha/number key edge (square) */
  --fn-w:       calc(var(--key) * 1.30);           /* function key width (rectangular) */
  --row-h:      var(--key);                        /* row height for keypad */
  --gap-h:      calc(var(--key) * 0.42);           /* horizontal gap (≥ 2.2× old) */
  --gap-v:      calc(var(--key) * 0.42);           /* vertical gap */
  --section-gap:calc(var(--key) * 0.85);           /* gap between LEFT/RIGHT key sections */
  --ann-w:      14px;                              /* annunciator strip width */
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}
html,body{height:100%;margin:0;padding:0;background:var(--bg-page);overflow:hidden;font-family:'B612 Mono',ui-monospace,Menlo,Consolas,monospace;color:#ddd}
body{
  display:flex;align-items:flex-start;justify-content:center;
  padding-top: max(env(safe-area-inset-top), 44px);
  padding-bottom: max(env(safe-area-inset-bottom), 8px);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* Landscape lock */
.rotate-warning{display:none;position:fixed;inset:0;background:#000;color:#eee;align-items:center;justify-content:center;text-align:center;z-index:9999;padding:24px;font-size:16px;letter-spacing:.04em}
@media (orientation:landscape){
  .rotate-warning{display:flex}
  .app{display:none!important}
}

/* ============================================================
   APP CONTAINER
   ============================================================ */
.app{
  position:relative;
  width:min(100vw, 680px);
  display:flex;flex-direction:column;align-items:center;
}

/* Reset button — outside bezel, top-right */
.reset-btn{
  position:absolute;top:-2px;right:6px;
  width:42px;height:42px;border-radius:50%;
  background:var(--reset-bg);color:#bbb;
  border:1px solid #444;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  box-shadow:0 2px 5px rgba(0,0,0,.5);
  z-index:10;cursor:pointer;
}
.reset-btn:active{background:#111;transform:scale(.94)}

/* ============================================================
   BEZEL
   ============================================================ */
.bezel{
  width:100%;
  background:linear-gradient(180deg,var(--bezel-light) 0%, var(--bezel) 45%, var(--bezel-dark) 100%);
  border:2px solid var(--bezel-edge);
  border-radius:14px;
  padding:14px 14px 12px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -1px 0 rgba(0,0,0,.25),
    0 8px 18px rgba(0,0,0,.55);
  display:flex;flex-direction:column;gap:14px;
  position:relative;
}

/* ============================================================
   DISPLAY ROW — LSK | screen | LSK
   ============================================================ */
.display-row{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  gap:6px;
  align-items:stretch;
}

/* LSK column shares 8-row template with screen so each LSK lines up */
.lsk-col{
  display:grid;
  grid-template-rows: 1fr repeat(6, 2fr) 1.2fr;
  gap:3px;
  padding:6px 0;
  justify-items:center;     /* center LSK rectangles horizontally */
  align-items:center;       /* center vertically in row */
}
/* Smaller, RECTANGULAR LSK buttons (FCOM-style) */
.lsk{
  width:28px;
  height:14px;
  background:repeating-linear-gradient(
    180deg,
    var(--lsk-stripe) 0 1.5px,
    transparent 1.5px 4px
  ),linear-gradient(180deg,#222,#0e0e0e);
  border:1px solid #050505;
  border-radius:2px;
  cursor:pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 2px rgba(0,0,0,.55),
    0 1px 1px rgba(0,0,0,.35);
}
.lsk:active,.lsk.is-pressed{filter:brightness(.5);transform:translateY(1px)}
.lsk-spacer{visibility:hidden;width:1px;height:1px}

/* Screen wrap — fixed aspect ratio guarantees stable layout */
.screen-wrap{
  position:relative;
  background:var(--screen-frame);
  border:2px solid #000;
  border-radius:8px;
  padding:6px 6px 6px;
  aspect-ratio: 5 / 4;
  display:flex;
  min-height:0;
}
/* Screw-head decorations on screen frame top corners */
.screen-wrap::before,.screen-wrap::after{
  content:"";position:absolute;top:4px;width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#aaa,#333);
  pointer-events:none;
}
.screen-wrap::before{left:6px}
.screen-wrap::after{right:6px}

/* The CDU display itself — 8-row grid never moves */
.screen{
  flex:1;
  background:var(--screen-bg);
  border-radius:4px;
  padding:6px 10px;
  display:grid;
  grid-template-rows: 1fr repeat(6, 2fr) 1.2fr;
  gap:1px;
  font-family:'B612 Mono',ui-monospace,Menlo,Consolas,monospace;
  font-weight:700;
  color:var(--cdu-white);
  font-size:clamp(10px,2.2vw,15px);
  line-height:1.1;
  letter-spacing:.06em;
  text-shadow:0 0 2px rgba(255,255,255,.18);
  background-image:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.015) 0 1px,
    transparent 1px 2px
  );
  overflow:hidden;
  min-height:0;
}
.screen > *{min-height:0;overflow:hidden}

.screen-title{text-align:center;align-self:center;color:var(--cdu-white);white-space:pre}
.screen-line{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 4px;white-space:pre;min-width:0;
}
.screen-line .left,.screen-line .right{color:var(--cdu-white);white-space:pre}
.screen-scratchpad{
  align-self:end;
  padding:0 4px;
  color:var(--cdu-white);
  white-space:pre;
  border-top:1px solid rgba(255,255,255,.04);
  height:100%;
  display:flex;align-items:center;
}

/* CDU page color helpers */
.cdu-w{color:var(--cdu-white)}
.cdu-c{color:var(--cdu-cyan)}
.cdu-m{color:var(--cdu-magenta)}
.cdu-g{color:var(--cdu-green)}
.cdu-sh{color:var(--cdu-shaded);background:rgba(255,255,255,.08)}

/* ============================================================
   KEYPAD AREA — annunciator strip | keypad | annunciator strip
   ============================================================ */
.keypad-area{
  display:flex;
  align-items:stretch;
  justify-content:center;
  gap:8px;
}

.ann-strip{
  background:var(--ann-bezel);
  border:1px solid #000;
  border-radius:3px;
  padding:10px 2px;
  display:flex;flex-direction:column;align-items:center;justify-content:space-around;
  gap:18px;
  font-size:9px;font-weight:700;letter-spacing:.20em;color:var(--ann-text);
  width:var(--ann-w);
  align-self:stretch;
  pointer-events:none;
  box-shadow:
    inset 0 0 3px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.05);
}
.ann-strip span{writing-mode:vertical-rl;text-orientation:upright;line-height:1}

/* ============================================================
   KEYPAD — two sections per row: LEFT (fn/numbers) + RIGHT (alpha/EXEC)
   ============================================================ */
.keypad{
  display:flex;
  flex-direction:column;
  gap:var(--gap-v);
  align-items:center;
}
.kp-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:var(--section-gap);
}
.kp-left,.kp-right{
  display:flex;
  align-items:center;
  gap:var(--gap-h);
}
.kp-left{
  /* fixed width = 5 fn keys + 4 gaps; rows with fewer keys are padded */
  width:calc(5 * var(--fn-w) + 4 * var(--gap-h));
  justify-content:flex-start;
}
.kp-right{
  /* fixed width = 5 alpha keys + 4 gaps */
  width:calc(5 * var(--key) + 4 * var(--gap-h));
  justify-content:flex-end;
}

/* ----- KEY base ----- */
.key{
  background:var(--key-bg);
  color:var(--key-text);
  border:1px solid var(--key-border);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'B612 Mono',ui-monospace,Menlo,Consolas,monospace;
  font-weight:700;
  font-size:11px;
  line-height:1;
  text-align:center;
  padding:0 2px;
  cursor:pointer;
  position:relative;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -2px 3px rgba(0,0,0,.55),
    0 1px 1px rgba(0,0,0,.4);
  transition:background-color .04s linear,transform .04s linear;
  letter-spacing:.04em;
}
.key:active,.key.is-pressed{
  background:var(--key-bg-active);
  transform:translateY(1px);
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04);
}

/* Function keys — RECTANGULAR (wider than tall) */
.key.fn{
  width:var(--fn-w);
  height:var(--row-h);
  font-size:9.5px;
  border-radius:3px;
}
.key.fn .legend{display:flex;flex-direction:column;align-items:center;line-height:1;gap:1px}

/* Alpha keys — SQUARE */
.key.alpha{
  width:var(--key);
  height:var(--key);
  font-size:14px;
}

/* Numeric keys — circular, square cell */
.key.num{
  width:var(--key);
  height:var(--key);
  font-size:14px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#2c2c2c,#0a0a0a 75%);
  border:1px solid #000;
}
.key.num:active{background:radial-gradient(circle at 35% 30%,#1a1a1a,#000 75%)}

/* Misc/utility keys (SP, DEL, /, CLR) — same square as alpha */
.key.misc{
  width:var(--key);
  height:var(--key);
  font-size:11px;
}

/* BRT knob — same alpha-square cell size */
.brt-knob{
  width:var(--key);
  height:var(--key);
  background:radial-gradient(circle at 35% 30%,#3a3a3a,#0a0a0a 75%);
  border-radius:50%;
  border:1px solid #000;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.08),
    inset 0 -3px 5px rgba(0,0,0,.6);
  position:relative;
  flex:0 0 auto;
}
.brt-knob::after{
  content:"BRT";position:absolute;top:50%;right:calc(100% + 6px);transform:translateY(-50%);
  font-size:10px;color:#1a1a1a;letter-spacing:.12em;font-weight:700;
}

/* EXEC cell — RECTANGULAR (spans 2 alpha widths + the gap between them),
   right edge aligns with E (rightmost) column */
.exec-cell{
  display:flex;flex-direction:column;align-items:stretch;gap:3px;
  width:calc(2 * var(--key) + var(--gap-h));
  flex:0 0 auto;
}
.exec-light{background:#0a0a0a;border:1px solid #000;border-radius:2px;height:6px;flex:0 0 auto}
.key.exec{
  flex:1;
  width:100%;
  height:calc(var(--row-h) - 9px); /* row height minus light bar + gap */
  font-size:11px;
  border-radius:3px;
}

/* Spacer cells inside kp-left / kp-right (preserve grid columns) */
.spc-fn{visibility:hidden;width:var(--fn-w);height:var(--row-h);flex:0 0 auto}
.spc-key{visibility:hidden;width:var(--key);height:var(--row-h);flex:0 0 auto}

/* Footer label */
.bezel-label{
  text-align:center;color:#1a1a1a;
  font-size:9px;letter-spacing:.18em;
  margin-top:2px;font-weight:700;
}

/* iPad mini portrait fallback */
@media (max-height:780px){
  :root{
    --key: clamp(24px, 4.6vw, 36px);
    --gap-h: calc(var(--key) * 0.40);
    --gap-v: calc(var(--key) * 0.40);
    --section-gap: calc(var(--key) * 0.80);
  }
  .bezel{padding:10px 10px 10px;gap:10px}
}
</style>
</head>
<body>

<div class="rotate-warning">Please rotate to portrait orientation.</div>

<div class="app">
  <button class="reset-btn" id="resetBtn" aria-label="Reset">⟲</button>

  <div class="bezel" id="bezel">

    <!-- ============ DISPLAY ROW ============ -->
    <div class="display-row">

      <div class="lsk-col">
        <div class="lsk-spacer"></div>
        <div class="lsk" data-lsk="L1" aria-label="LSK L1"></div>
        <div class="lsk" data-lsk="L2" aria-label="LSK L2"></div>
        <div class="lsk" data-lsk="L3" aria-label="LSK L3"></div>
        <div class="lsk" data-lsk="L4" aria-label="LSK L4"></div>
        <div class="lsk" data-lsk="L5" aria-label="LSK L5"></div>
        <div class="lsk" data-lsk="L6" aria-label="LSK L6"></div>
        <div class="lsk-spacer"></div>
      </div>

      <div class="screen-wrap">
        <div class="screen" id="screen">
          <div class="screen-title">TRAINING EMRE</div>
          <div class="screen-line" data-row="0">
            <span class="left"  id="line-0-L">------</span>
            <span class="right" id="line-0-R">------</span>
          </div>
          <div class="screen-line" data-row="1">
            <span class="left"  id="line-1-L">------</span>
            <span class="right" id="line-1-R">------</span>
          </div>
          <div class="screen-line" data-row="2">
            <span class="left"  id="line-2-L">------</span>
            <span class="right" id="line-2-R">------</span>
          </div>
          <div class="screen-line" data-row="3">
            <span class="left"  id="line-3-L">------</span>
            <span class="right" id="line-3-R">------</span>
          </div>
          <div class="screen-line" data-row="4">
            <span class="left"  id="line-4-L">------</span>
            <span class="right" id="line-4-R">------</span>
          </div>
          <div class="screen-line" data-row="5">
            <span class="left"  id="line-5-L">------</span>
            <span class="right" id="line-5-R">------</span>
          </div>
          <div class="screen-scratchpad" id="scratchpad"></div>
        </div>
      </div>

      <div class="lsk-col">
        <div class="lsk-spacer"></div>
        <div class="lsk" data-lsk="R1" aria-label="LSK R1"></div>
        <div class="lsk" data-lsk="R2" aria-label="LSK R2"></div>
        <div class="lsk" data-lsk="R3" aria-label="LSK R3"></div>
        <div class="lsk" data-lsk="R4" aria-label="LSK R4"></div>
        <div class="lsk" data-lsk="R5" aria-label="LSK R5"></div>
        <div class="lsk" data-lsk="R6" aria-label="LSK R6"></div>
        <div class="lsk-spacer"></div>
      </div>

    </div><!-- /display-row -->

    <!-- ============ KEYPAD AREA (with side annunciator strips) ============ -->
    <div class="keypad-area">

      <!-- LEFT annunciator strip — CALL / FAIL (silk-screen, non-functional) -->
      <div class="ann-strip ann-strip-left" aria-hidden="true">
        <span>CALL</span>
        <span>FAIL</span>
      </div>

      <div class="keypad" id="keypad">

        <!-- Row 1: 5 fn keys (left) | BRT (right) -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key fn" data-noop><span class="legend"><span>INIT</span><span>REF</span></span></button>
            <button class="key fn" data-noop>RTE</button>
            <button class="key fn" data-noop>CLB</button>
            <button class="key fn" data-noop>CRZ</button>
            <button class="key fn" data-noop>DES</button>
          </div>
          <div class="kp-right">
            <div class="spc-key"></div>
            <div class="spc-key"></div>
            <div class="spc-key"></div>
            <div class="spc-key"></div>
            <div class="brt-knob"></div>
          </div>
        </div>

        <!-- Row 2: 5 fn keys (left) | EXEC rectangular, right-aligned to E -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key fn" data-noop>MENU</button>
            <button class="key fn" data-noop>LEGS</button>
            <button class="key fn" data-noop><span class="legend"><span>DEP</span><span>ARR</span></span></button>
            <button class="key fn" data-noop>HOLD</button>
            <button class="key fn" data-noop>PROG</button>
          </div>
          <div class="kp-right">
            <div class="spc-key"></div>
            <div class="spc-key"></div>
            <div class="spc-key"></div>
            <div class="exec-cell">
              <div class="exec-light"></div>
              <button class="key exec" data-noop>EXEC</button>
            </div>
          </div>
        </div>

        <!-- Row 3: N1 LIMIT, FIX (left) | A B C D E (right) -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key fn" data-noop><span class="legend"><span>N1</span><span>LIMIT</span></span></button>
            <button class="key fn" data-noop>FIX</button>
            <div class="spc-fn"></div>
            <div class="spc-fn"></div>
            <div class="spc-fn"></div>
          </div>
          <div class="kp-right">
            <button class="key alpha" data-char="A">A</button>
            <button class="key alpha" data-char="B">B</button>
            <button class="key alpha" data-char="C">C</button>
            <button class="key alpha" data-char="D">D</button>
            <button class="key alpha" data-char="E">E</button>
          </div>
        </div>

        <!-- Row 4: PREV PAGE, NEXT PAGE (left) | F G H I J -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key fn" data-noop><span class="legend"><span>PREV</span><span>PAGE</span></span></button>
            <button class="key fn" data-noop><span class="legend"><span>NEXT</span><span>PAGE</span></span></button>
            <div class="spc-fn"></div>
            <div class="spc-fn"></div>
            <div class="spc-fn"></div>
          </div>
          <div class="kp-right">
            <button class="key alpha" data-char="F">F</button>
            <button class="key alpha" data-char="G">G</button>
            <button class="key alpha" data-char="H">H</button>
            <button class="key alpha" data-char="I">I</button>
            <button class="key alpha" data-char="J">J</button>
          </div>
        </div>

        <!-- Row 5: 1 2 3 (left, square) | K L M N O -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key num" data-char="1">1</button>
            <button class="key num" data-char="2">2</button>
            <button class="key num" data-char="3">3</button>
          </div>
          <div class="kp-right">
            <button class="key alpha" data-char="K">K</button>
            <button class="key alpha" data-char="L">L</button>
            <button class="key alpha" data-char="M">M</button>
            <button class="key alpha" data-char="N">N</button>
            <button class="key alpha" data-char="O">O</button>
          </div>
        </div>

        <!-- Row 6: 4 5 6 | P Q R S T -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key num" data-char="4">4</button>
            <button class="key num" data-char="5">5</button>
            <button class="key num" data-char="6">6</button>
          </div>
          <div class="kp-right">
            <button class="key alpha" data-char="P">P</button>
            <button class="key alpha" data-char="Q">Q</button>
            <button class="key alpha" data-char="R">R</button>
            <button class="key alpha" data-char="S">S</button>
            <button class="key alpha" data-char="T">T</button>
          </div>
        </div>

        <!-- Row 7: 7 8 9 | U V W X Y -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key num" data-char="7">7</button>
            <button class="key num" data-char="8">8</button>
            <button class="key num" data-char="9">9</button>
          </div>
          <div class="kp-right">
            <button class="key alpha" data-char="U">U</button>
            <button class="key alpha" data-char="V">V</button>
            <button class="key alpha" data-char="W">W</button>
            <button class="key alpha" data-char="X">X</button>
            <button class="key alpha" data-char="Y">Y</button>
          </div>
        </div>

        <!-- Row 8: . 0 +/− | Z SP DEL / CLR -->
        <div class="kp-row">
          <div class="kp-left">
            <button class="key num" data-char=".">.</button>
            <button class="key num" data-char="0">0</button>
            <button class="key num" data-action="plusminus">+/−</button>
          </div>
          <div class="kp-right">
            <button class="key alpha" data-char="Z">Z</button>
            <button class="key misc" data-action="space">SP</button>
            <button class="key misc" data-action="delete">DEL</button>
            <button class="key alpha" data-char="/">/</button>
            <button class="key misc" id="clrKey" data-action="clear">CLR</button>
          </div>
        </div>

      </div><!-- /keypad -->

      <!-- RIGHT annunciator strip — MSG / OFST (silk-screen, non-functional) -->
      <div class="ann-strip ann-strip-right" aria-hidden="true">
        <span>MSG</span>
        <span>OFST</span>
      </div>

    </div><!-- /keypad-area -->

    <div class="bezel-label">FORWARD ELECTRONIC PANEL (MCDU)</div>
  </div><!-- /bezel -->
</div><!-- /app -->

<script>
/* ============================================================
   CDU TRAINER — Application Logic
   Stable DOM: only textContent on a fixed grid → ZERO layout shift.
   Events: pointerdown for snappy iPad input.
   ============================================================ */
const SCRATCHPAD_MAX = 22;
const CLR_HOLD_MS    = 1000;

const state = {
  scratchpad:'',
  scratchpadIsMsg:false,
  lines:Array.from({length:6},()=>({left:'',right:''})),
  plusMinusActive:false,
};

const $scratchpad = document.getElementById('scratchpad');
const $linesL = []; const $linesR = [];
for(let i=0;i<6;i++){
  $linesL.push(document.getElementById(`line-${i}-L`));
  $linesR.push(document.getElementById(`line-${i}-R`));
}

function render(){
  for(let i=0;i<6;i++){
    const L = state.lines[i].left;
    const R = state.lines[i].right;
    $linesL[i].textContent = L === '' ? '------' : L;
    $linesR[i].textContent = R === '' ? '------' : R;
  }
  $scratchpad.textContent = state.scratchpad;
}

function appendChar(c){
  if(state.scratchpadIsMsg){ state.scratchpad=''; state.scratchpadIsMsg=false; }
  if(state.scratchpad.length >= SCRATCHPAD_MAX) return;
  state.scratchpad += c;
  state.plusMinusActive = false;
  render();
}

function pressPlusMinus(){
  if(state.scratchpadIsMsg){ state.scratchpad=''; state.scratchpadIsMsg=false; }
  if(state.plusMinusActive && state.scratchpad.length>0){
    const last = state.scratchpad.slice(-1);
    if(last === '-' || last === '+'){
      state.scratchpad = state.scratchpad.slice(0,-1) + (last === '-' ? '+' : '-');
      render(); return;
    }
  }
  if(state.scratchpad.length >= SCRATCHPAD_MAX) return;
  state.scratchpad += '-';
  state.plusMinusActive = true;
  render();
}

function pressSpace(){ appendChar(' '); }

function pressDelete(){
  if(state.scratchpad === 'DELETE') return;
  state.scratchpad = 'DELETE';
  state.scratchpadIsMsg = false;
  state.plusMinusActive = false;
  render();
}

function clrShortPress(){
  if(state.scratchpadIsMsg){
    state.scratchpad=''; state.scratchpadIsMsg=false;
  } else if(state.scratchpad.length>0){
    state.scratchpad = state.scratchpad.slice(0,-1);
  }
  state.plusMinusActive = false;
  render();
}
function clrLongPress(){
  state.scratchpad=''; state.scratchpadIsMsg=false; state.plusMinusActive=false;
  render();
}

function pressLSK(id){
  const side = id[0];
  const idx  = parseInt(id.slice(1),10) - 1;
  if(idx<0||idx>5) return;
  const slot = side === 'L' ? 'left' : 'right';
  const lineVal  = state.lines[idx][slot];

  if(state.scratchpad === 'DELETE'){
    state.lines[idx][slot] = '';
    state.scratchpad = '';
    state.scratchpadIsMsg = false;
    state.plusMinusActive = false;
    render(); return;
  }

  const sp = state.scratchpad;
  if(sp.length === 0 && lineVal.length === 0) return;

  if(sp.length === 0){
    state.scratchpad = lineVal; state.scratchpadIsMsg = false;
    state.lines[idx][slot] = '';
  } else if(lineVal.length === 0){
    state.lines[idx][slot] = sp;
    state.scratchpad = ''; state.scratchpadIsMsg = false;
  } else {
    state.lines[idx][slot] = sp;
    state.scratchpad = lineVal; state.scratchpadIsMsg = false;
  }
  state.plusMinusActive = false;
  render();
}

function resetAll(){
  state.scratchpad='';
  state.scratchpadIsMsg=false;
  state.plusMinusActive=false;
  state.lines = Array.from({length:6},()=>({left:'',right:''}));
  render();
}

/* Event wiring — pointerdown for snappy iPad */
function flash(el){
  el.classList.add('is-pressed');
  setTimeout(()=>el.classList.remove('is-pressed'),60);
}
function handleKeyPress(btn){
  if(btn.dataset.noop !== undefined) return;
  const action = btn.dataset.action;
  const ch = btn.dataset.char;
  if(action === 'plusminus')  return pressPlusMinus();
  if(action === 'space')      return pressSpace();
  if(action === 'delete')     return pressDelete();
  if(action === 'clear')      return;
  if(typeof ch === 'string')  return appendChar(ch);
}
document.querySelectorAll('.key').forEach(btn=>{
  btn.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    flash(btn);
    if(btn.id === 'clrKey') return;
    handleKeyPress(btn);
  });
  btn.addEventListener('click', e=>e.preventDefault());
});

/* CLR — long-press support */
(function wireCLR(){
  const clr = document.getElementById('clrKey');
  let longFired = false, holdTimer = null;
  clr.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    longFired = false;
    holdTimer = setTimeout(()=>{ longFired = true; clrLongPress(); }, CLR_HOLD_MS);
  });
  const finish = ()=>{
    if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
    if(!longFired) clrShortPress();
  };
  const cancel = ()=>{ if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; } longFired = true; };
  clr.addEventListener('pointerup',   finish);
  clr.addEventListener('pointercancel', cancel);
  clr.addEventListener('pointerleave', cancel);
})();

document.querySelectorAll('.lsk').forEach(el=>{
  el.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    flash(el);
    pressLSK(el.dataset.lsk);
  });
});

document.getElementById('resetBtn').addEventListener('click', resetAll);
document.addEventListener('gesturestart', e=>e.preventDefault());
document.getElementById('bezel').addEventListener('contextmenu', e=>e.preventDefault());

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

render();

window.CDU = {
  getState: ()=> JSON.parse(JSON.stringify(state)),
  setScratchpad: (s)=>{ state.scratchpad=String(s||''); state.scratchpadIsMsg=false; render(); },
  reset: resetAll,
};
</script>
</body>
</html>
